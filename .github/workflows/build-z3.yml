name: Build Z3 Solver

## Builds Z3 from source for multiple platforms and publishes each binary
## as a GitHub release asset.  Z3 version is parameterised.
##
## ╔════════════════════════════════════════════╗
## ║  To change the default Z3 version,         ║
## ║  edit DEFAULT_Z3_VERSION below only.       ║ 
## ║                                            ║
## ║   To initiata a build vis command-line use ║
## ║   gh workflow run build-z3.yml --repo OpenJML/Solvers --ref build --field z3_version=$1
## ║   substituting the versino number for $1   ║
## ╚════════════════════════════════════════════╝
##
## Matrix:
##   ubuntu-arm64   — ubuntu-24.04-arm runner, ubuntu:20.04 container (GCC 9)
##   ubuntu-x86_64  — ubuntu-24.04     runner, ubuntu:20.04 container (GCC 9)
##   macos-arm64    — macos-14 runner, native Apple Clang (ARM64)
##   macos-x86_64   — macos-14 runner, native Apple Clang via arch -x86_64 (Rosetta)
##
## Z3 4.3.x requires GCC ≤ 9 on Linux (C++ violations in mpq.h rejected by
## GCC 10+).  We run Linux jobs inside an ubuntu:20.04 container for GCC 9.
## macOS uses Apple Clang which handles the old code differently (some
## violations become warnings rather than errors with -fpermissive).
##
## A single release is created once by the 'prepare' job; every platform's
## binary is uploaded to that same release.  The tag is based on the Z3
## version and a UTC timestamp so each workflow run produces a new release.

## ── Single version setting ───────────────────────────────────────────────────
env:
  DEFAULT_Z3_VERSION: '4.3.2'   ## ← change this to build a different Z3 version

on:
  push:
    branches: [ build ]
  workflow_dispatch:
    inputs:
      z3_version:
        description: 'Z3 version tag to build (overrides DEFAULT_Z3_VERSION)'
        required: false
        default: ''

jobs:

  ## ── Create the shared GitHub release ─────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag:       ${{ steps.rel.outputs.tag }}
      title:     ${{ steps.rel.outputs.title }}
      z3_version: ${{ steps.rel.outputs.z3_version }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
    - name: Create release
      id: rel
      run: |
        ## env.DEFAULT_Z3_VERSION is accessible here (step run context).
        ## The resolved version is exposed as an output so build-z3 can
        ## reference it via needs.prepare.outputs.z3_version — avoiding
        ## the job env: context where 'env' named-value is not available.
        ver="${{ inputs.z3_version || env.DEFAULT_Z3_VERSION }}"
        ts=$(date -u +%Y%m%d-%H%M%S)
        tag="z3-${ver}-${ts}"
        title="Z3 ${ver} — $(date -u '+%Y-%m-%d %H:%M UTC')"
        echo "z3_version=$ver" >> "$GITHUB_OUTPUT"
        echo "tag=$tag"        >> "$GITHUB_OUTPUT"
        echo "title=$title"    >> "$GITHUB_OUTPUT"
        ## Create as a draft so it is invisible until all builds succeed.
        ## The 'finalize' job publishes it once every platform has uploaded.
        gh release create "$tag" \
          --repo "${{ github.repository }}" \
          --title "$title" \
          --draft \
          --notes "Z3 ${ver} binaries for ubuntu-arm64, ubuntu-x86_64, macos-arm64, macos-x86_64. Built from https://github.com/Z3Prover/z3/releases/tag/z3-${ver}."

  ## ── Build matrix ─────────────────────────────────────────────────────────
  build-z3:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner:    ubuntu-24.04-arm
            label:     ubuntu-arm64
            container: ubuntu:20.04
            arch_cmd:  ''
          - runner:    ubuntu-24.04
            label:     ubuntu-x86_64
            container: ubuntu:20.04
            arch_cmd:  ''
          - runner:    macos-14
            label:     macos-arm64
            container: ''
            arch_cmd:  ''
          - runner:    macos-14
            label:     macos-x86_64
            container: ''
            arch_cmd:  'arch -x86_64'

    runs-on: ${{ matrix.runner }}

    ## The container field runs all steps inside the named Docker image rather
    ## than directly on the runner.  For Linux jobs, ubuntu:20.04 provides GCC 9
    ## (Z3 4.3.x's C++ code has violations that GCC 10+ rejects as errors).
    ## The runner supplies the CPU architecture and Docker engine; the container
    ## supplies the compiler and libraries.  The resulting binary targets the
    ## container's architecture natively — no cross-compilation or emulation.
    ## For macOS jobs, container is '' (empty string), which GitHub Actions
    ## treats as "no container": steps run directly on the macOS runner using
    ## Xcode/Apple Clang.  macOS runners cannot run Linux Docker containers.
    container: ${{ matrix.container }}

    env:
      Z3_VERSION: ${{ needs.prepare.outputs.z3_version }}
      OS_LABEL:   ${{ matrix.label }}

    steps:
    ## ── Metadata ───────────────────────────────────────────────────────────
    - name: Set build metadata
      id: meta
      run: |
        ver="${{ env.Z3_VERSION }}"
        os="${{ env.OS_LABEL }}"
        echo "asset_name=z3-${ver}-${os}" >> "$GITHUB_OUTPUT"

    ## ── Dependencies ───────────────────────────────────────────────────────
    - name: Install build dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        apt-get update -qq
        DEBIAN_FRONTEND=noninteractive apt-get install -y \
          python3 python3-distutils 2to3 build-essential curl ca-certificates jq
        curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
          | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
          > /etc/apt/sources.list.d/github-cli.list
        apt-get update -qq
        apt-get install -y gh

    - name: Install build dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        ## Xcode command-line tools are pre-installed; ensure gh is available.
        brew install gh || true
        ## 2to3 ships with Python 3 on macOS.
        which 2to3 || pip3 install 2to3 || true

    ## ── Source ─────────────────────────────────────────────────────────────
    - name: Download Z3 source
      run: |
        curl -fsSL "https://github.com/Z3Prover/z3/archive/refs/tags/z3-${{ env.Z3_VERSION }}.tar.gz" \
             | tar xz
        echo "Source directory: $(ls -d z3-z3-*/)"

    ## ── Patch ──────────────────────────────────────────────────────────────
    - name: Patch Z3 source for Python 3 and platform compatibility
      run: |
        cd "z3-z3-${{ env.Z3_VERSION }}"

        ## 0. Strip Windows SAL annotation macros (__in, __out, __inout).
        ##    On Linux these expand to empty and conflict with GCC 9 STL variable
        ##    names (stl_algo.h uses __in as a loop variable).  Removing them is
        ##    semantically neutral since they always expand to nothing.
        python3 -c "
        import os, pathlib, re
        count = 0
        sal_names = ('__in', '__out', '__inout')

        def strip_sal(t):
            for name in sal_names:
                block = '#ifndef %s\n#define %s\n#endif' % (name, name)
                t = t.replace(block + '\n', '').replace(block, '')
            lines = t.splitlines(keepends=True)
            new_lines = []
            for line in lines:
                s = line.lstrip()
                if s.startswith('#undef') or s.startswith('#ifndef') or s.startswith('#ifdef'):
                    new_lines.append(line)
                elif s.startswith('#define'):
                    m = re.match(r'([ \t]*#define[ \t]+\w+(?:\([^)]*\))?)(.*)', line, re.DOTALL)
                    if m:
                        prefix, body = m.group(1), m.group(2)
                        for name in sal_names:
                            body = re.sub(r'\b' + re.escape(name) + r'\b', '', body)
                        new_lines.append(prefix + body)
                    else:
                        new_lines.append(line)
                else:
                    for name in sal_names:
                        line = re.sub(r'\b' + re.escape(name) + r'\b', '', line)
                    new_lines.append(line)
            return ''.join(new_lines)

        for root, dirs, files in os.walk('src'):
            for fname in files:
                if not fname.endswith(('.h', '.cpp', '.cc', '.c')):
                    continue
                p = pathlib.Path(root, fname)
                try:
                    t = p.read_text(errors='replace')
                except Exception:
                    continue
                new_t = strip_sal(t)
                if new_t != t:
                    p.write_text(new_t)
                    count += 1
        print(f'Stripped SAL annotations from {count} file(s)')
        "

        ## 1a. Replace distutils.sysconfig (removed in Python 3.12) with sysconfig.
        ##     Handles all known uses across Z3 4.3.x versions:
        ##       get_python_lib()     → sysconfig.get_path('purelib')
        ##       get_python_version() → sysconfig.get_python_version()
        python3 -c "
        import pathlib
        p = pathlib.Path('scripts/mk_util.py')
        t = p.read_text(errors='replace')
        t = t.replace('import distutils.sysconfig',
                      'import sysconfig as _sysconfig_mod')
        t = t.replace('distutils.sysconfig.get_python_lib()',
                      '_sysconfig_mod.get_path(\"purelib\")')
        t = t.replace('distutils.sysconfig.get_python_version()',
                      '_sysconfig_mod.get_python_version()')
        p.write_text(t)
        print('Patched distutils.sysconfig in mk_util.py')
        "

        ## 1. Convert Python 2 syntax; fix tab/space mixing.
        2to3 -w scripts/ src/api/python/ > /dev/null 2>&1
        for f in scripts/*.py src/api/python/*.py; do
            expand -t 8 "$f" > /tmp/pf && mv /tmp/pf "$f"
        done

        ## 2. Skip non-Linux Makefile targets from mk_make.py.
        python3 -c "
        import pathlib
        p = pathlib.Path('scripts/mk_make.py')
        t = p.read_text()
        for skip in ['check_eol()', 'mk_vs_proj(']:
            t = '\n'.join(
                ('# ' + l if l.strip().startswith(skip.split('(')[0]) else l)
                for l in t.splitlines()
            )
        p.write_text(t)
        "

        ## 3. Fix sorted(cnames, cmp=...) missed by 2to3.
        python3 -c "
        import pathlib
        p = pathlib.Path('scripts/mk_util.py')
        t = p.read_text()
        t = t.replace(
            'return sorted(cnames, cmp=comp_components)',
            'import functools; return sorted(cnames, key=functools.cmp_to_key(comp_components))'
        )
        p.write_text(t)
        "

        ## 4. ARM64: create emmintrin.h stub (SSE2 header absent on ARM).
        ##    On x86_64 (Linux and macOS) emmintrin.h exists natively.
        arch=$(uname -m)
        if [ "$arch" = "aarch64" ] || [ "$arch" = "arm64" ]; then
            mkdir -p /tmp/stub_includes
            printf '%s\n' \
              '#pragma once' \
              '/* ARM64 stub for x86 SSE2 scalar-double intrinsics */' \
              '#include <fenv.h>' \
              '#include <math.h>' \
              'typedef double __m128d;' \
              'static inline __m128d _mm_set_sd(double d){return d;}' \
              'static inline void _mm_store_sd(double*p,__m128d m){*p=m;}' \
              'static inline __m128d _mm_add_sd(__m128d a,__m128d b){return a+b;}' \
              'static inline __m128d _mm_sub_sd(__m128d a,__m128d b){return a-b;}' \
              'static inline __m128d _mm_mul_sd(__m128d a,__m128d b){return a*b;}' \
              'static inline __m128d _mm_div_sd(__m128d a,__m128d b){return a/b;}' \
              'static inline __m128d _mm_sqrt_pd(__m128d a){return sqrt(a);}' \
              'static inline __m128d _mm_max_sd(__m128d a,__m128d b){return(a>b)?a:b;}' \
              'static inline __m128d _mm_min_sd(__m128d a,__m128d b){return(a<b)?a:b;}' \
              '#define _MM_ROUND_NEAREST     FE_TONEAREST' \
              '#define _MM_ROUND_DOWN        FE_DOWNWARD' \
              '#define _MM_ROUND_UP          FE_UPWARD' \
              '#define _MM_ROUND_TOWARD_ZERO FE_TOWARDZERO' \
              '#define _MM_SET_ROUNDING_MODE(x) fesetround(x)' \
              > /tmp/stub_includes/emmintrin.h
            ## Also install to /usr/local/include so the compiler finds it without any -I flag.
            ## This is necessary for Z3 4.3.2 where the generated build/config.mk
            ## may not propagate our custom -I flag into every compilation command.
            ## /usr/local/include may not exist on macOS runners, so mkdir -p first.
            mkdir -p /usr/local/include
            cp /tmp/stub_includes/emmintrin.h /usr/local/include/emmintrin.h
            echo "Created ARM64 emmintrin.h stub (also installed to /usr/local/include/)"
            STUB_INC="-I/tmp/stub_includes"
        else
            STUB_INC=""
        fi

        ## 5. Linux: cast UINT64_MAX to resolve overload ambiguity.
        ##    On Linux (both x86_64 and arm64), UINT64_MAX is 'unsigned long'
        ##    but Z3's uint64 = 'unsigned long long' — both 64-bit but distinct
        ##    types, creating ambiguous set(mpz&, ...) overloads.
        if [ "$(uname)" = "Linux" ]; then
            python3 -c "
        import pathlib
        p = pathlib.Path('src/util/mpz.cpp')
        t = p.read_text(errors='replace')
        t = t.replace('set(m_two64, UINT64_MAX)', 'set(m_two64, (uint64)UINT64_MAX)')
        p.write_text(t)
        print('Patched UINT64_MAX cast in mpz.cpp')
            "
        fi

        ## 6. Re-encode any Latin-1 bytes in C++ source files to UTF-8.
        python3 -c "
        import os, pathlib
        n = 0
        for root, dirs, files in os.walk('.'):
            for fname in files:
                if fname.endswith(('.h', '.cpp', '.cc', '.c')):
                    p = pathlib.Path(root, fname)
                    try:
                        p.read_text()
                    except UnicodeDecodeError:
                        p.write_text(p.read_text(encoding='latin-1'))
                        n += 1
        print(f'Re-encoded {n} file(s) as UTF-8')
        "

        ## 7. Generate scripts/config-release.mk with platform-specific values.
        ##    Linux:  GCC, static C++ runtime, -lrt for POSIX timers.
        ##    macOS:  Apple Clang, dynamic libs (macOS C++ runtime is part of OS).
        ARCH_CMD="${{ matrix.arch_cmd }}"
        if [ "$(uname)" = "Darwin" ]; then
            CXX_CMD="clang++"
            if [ -n "$ARCH_CMD" ]; then
                CXX_CMD="$ARCH_CMD clang++"
            fi
            printf '%s\n' \
              "CC=clang" "PREFIX=/usr/local" "CXX=clang++" \
              "CXXFLAGS= -c -O2 -D _EXTERNAL_RELEASE -D_NO_OMP_ -D_MP_INTERNAL ${STUB_INC} -fpermissive -Wno-c++11-extensions -fomit-frame-pointer" \
              'CXX_OUT_FLAG=-o' 'OBJ_EXT=.o' 'LIB_EXT=.a' \
              'AR=ar' 'AR_FLAGS=rcs' 'AR_OUTFLAG=' 'EXE_EXT=' \
              'LINK=clang++' 'LINK_FLAGS=' \
              'LINK_OUT_FLAG=-o' 'LINK_EXTRA_FLAGS=-lpthread' \
              'SO_EXT=.dylib' 'SLINK=clang++' 'SLINK_FLAGS=-dynamiclib' \
              'SLINK_EXTRA_FLAGS=' 'SLINK_OUT_FLAG=-o' \
              > scripts/config-release.mk
        else
            printf '%s\n' \
              'CC=gcc' 'PREFIX=/usr/local' 'CXX=g++' \
              "CXXFLAGS= -c -O3 -D _EXTERNAL_RELEASE -D_NO_OMP_ -D_MP_INTERNAL ${STUB_INC} -fomit-frame-pointer" \
              'CXX_OUT_FLAG=-o' 'OBJ_EXT=.o' 'LIB_EXT=.a' \
              'AR=ar' 'AR_FLAGS=rcs' 'AR_OUTFLAG=' 'EXE_EXT=' \
              'LINK=g++' 'LINK_FLAGS=-static-libstdc++ -static-libgcc' \
              'LINK_OUT_FLAG=-o' 'LINK_EXTRA_FLAGS=-lpthread -lrt' \
              'SO_EXT=.so' 'SLINK=g++' 'SLINK_FLAGS=-shared' \
              'SLINK_EXTRA_FLAGS=' 'SLINK_OUT_FLAG=-o' \
              > scripts/config-release.mk
        fi
        echo "config-release.mk generated"
        cat scripts/config-release.mk

    ## ── Generate Makefile ─────────────────────────────────────────────────
    - name: Generate Z3 Makefile
      run: |
        cd "z3-z3-${{ env.Z3_VERSION }}"
        set +e
        python3 -W ignore::SyntaxWarning scripts/mk_make.py > /tmp/mk_out.txt 2>&1
        ec=$?
        { grep -E "MKException|Failed to find|Error:|Traceback|raise " /tmp/mk_out.txt 2>/dev/null || true; \
          tail -5 /tmp/mk_out.txt; } | sort -u | while IFS= read -r line; do
            echo "::error file=scripts/mk_make.py::$line"
        done
        set -e
        ## Remove x86-only SIMD flags that Z3 4.3.x mk_util.py injects into
        ## the generated build files for Linux regardless of CPU architecture.
        ## On ARM64 these flags cause a hard compiler error.
        ## Use Python (not sed) for reliable regex replacement across all
        ## generated .mk / Makefile files in the build directory.
        if [ $ec -eq 0 ] && [ "$(uname -m)" = "aarch64" ]; then
            python3 -c "
        import pathlib, re
        flags = re.compile(r'-mfpmath=sse|-msse2|-msse(?!\d)')
        count = 0
        for p in pathlib.Path('build').glob('*'):
            if p.is_file() and (p.suffix in ('.mk', '.make') or p.name == 'Makefile'):
                t = p.read_text(errors='replace')
                new_t = flags.sub('', t)
                if new_t != t:
                    p.write_text(new_t)
                    count += 1
                    print('Stripped SSE flags from', p.name)
        print(f'Patched {count} file(s)')
            "
        fi
        exit $ec

    ## ── Build ──────────────────────────────────────────────────────────────
    - name: Build Z3
      run: |
        ARCH_CMD="${{ matrix.arch_cmd }}"
        JOBS=$(nproc 2>/dev/null || sysctl -n hw.logicalcpu 2>/dev/null || echo 4)
        set +e
        $ARCH_CMD make -j"$JOBS" -C "z3-z3-${{ env.Z3_VERSION }}/build" z3 > /tmp/build_out.txt 2>&1
        ec=$?
        grep -E "undefined reference|error:|ld returned|ld: error" /tmp/build_out.txt \
          | head -15 | while IFS= read -r line; do
            echo "::error::$line"
        done
        set -e; exit $ec

    ## ── Verify ─────────────────────────────────────────────────────────────
    - name: Verify binary
      run: |
        binary="z3-z3-${{ env.Z3_VERSION }}/build/z3"
        ## For macOS x86_64 (Rosetta build) prepend arch -x86_64 when running.
        ARCH_CMD="${{ matrix.arch_cmd }}"

        echo "=== file type / size ==="
        file "$binary"
        ls -lh "$binary"

        echo "=== dynamic dependencies ==="
        if command -v ldd > /dev/null 2>&1; then
            ldd "$binary" || true
        elif command -v otool > /dev/null 2>&1; then
            otool -L "$binary"
        fi

        echo "=== z3 version ==="
        $ARCH_CMD "$binary" -version || echo "(z3 -version exited non-zero — continuing)"

        echo "=== smoke test: (check-sat) via temp file ==="
        ## The input file includes (exit) so Z3 terminates after check-sat.
        ## timeout is intentionally omitted: it cannot wrap a command that
        ## includes a variable prefix, and macOS may not have GNU timeout.
        tmp=$(mktemp /tmp/z3_smoke_XXXXXX.smt2)
        printf '(check-sat)\n(exit)\n' > "$tmp"
        smoke_out=$($ARCH_CMD "$binary" -smt2 "$tmp" 2>&1)
        ec=$?
        rm -f "$tmp"
        echo "$smoke_out"
        if [ $ec -ne 0 ] && ! echo "$smoke_out" | grep -q "^sat"; then
            echo "FAIL: z3 exited $ec and did not produce 'sat'"
            exit 1
        fi
        if echo "$smoke_out" | grep -q "^ERROR"; then
            echo "FAIL: z3 reported errors"
            exit 1
        fi
        if ! echo "$smoke_out" | grep -q "^sat"; then
            echo "FAIL: expected 'sat' in output, got: $smoke_out"
            exit 1
        fi
        echo "Smoke test passed"

    ## ── Publish ────────────────────────────────────────────────────────────
    - name: Upload asset to shared release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        asset="${{ steps.meta.outputs.asset_name }}"
        cp "z3-z3-${{ env.Z3_VERSION }}/build/z3" "$asset"
        gh release upload "${{ needs.prepare.outputs.tag }}" \
          --repo "${{ github.repository }}" \
          "${asset}#${asset}"

  ## ── Publish draft once all builds succeed ────────────────────────────────
  finalize:
    needs: [ prepare, build-z3 ]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
    - name: Publish release
      run: |
        gh release edit "${{ needs.prepare.outputs.tag }}" \
          --repo "${{ github.repository }}" \
          --draft=false
        echo "Published: ${{ needs.prepare.outputs.tag }}"
